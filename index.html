<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор ссылок</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; color:#222; }
  h1 { font-size: 22px; }
  label { display:block; margin-top: 14px; font-weight: 600; font-size: 14px; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
  button { margin-top: 18px; padding: 10px 16px; font-size: 14px; cursor: pointer; }
  #result { margin-top: 20px; padding: 12px; background: #f4f4f4; border-radius: 6px; word-break: break-all; font-size: 14px; }
  #copyBtn { margin-top: 10px; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>Конструктор ссылок</h1>

<label for="url">Ссылка (корень + ?start=)</label>
<input type="text" id="url" placeholder="https://t.me/potokizobot?start=">
<button type="button" onclick="fillDefaultUrl()">https://t.me/potokizobot?start=</button>

<label for="platform">Платформа</label>
<select id="platform" onchange="onPlatformChange()">
  <option value="">— выберите —</option>
  <option value="tg">Телеграм</option>
  <option value="yt">Ютуб</option>
  <option value="rt">Рутуб</option>
  <option value="ig">Инстаграм</option>
  <option value="vk">ВК</option>
  <option value="trds">Тредс</option>
  <option value="dzen">Дзен</option>
  <option value="pp">ПП</option>
  <option value="aj">АЖ</option>
  <option value="__custom__">Другое...</option>
</select>
<input type="text" id="platformCustom" placeholder="введите своё значение" class="hidden">

<div id="label1Wrap">
  <label for="label1Select">Метка 1</label>
  <select id="label1Select" onchange="onLabel1Change()"></select>
  <input type="text" id="label1Custom" placeholder="введите своё значение" class="hidden">
</div>

<label for="label2">Метка 2 (опционально)</label>
<input type="text" id="label2" placeholder="опционально">

<label for="label3">Метка 3 (опционально)</label>
<input type="text" id="label3" placeholder="опционально">

<button onclick="build()">Сформировать ссылку</button>

<div id="result" style="display:none;"></div>
<button id="copyBtn" style="display:none;" onclick="copyResult()">Скопировать</button>

<script>
const presets = {
  ig: [
    { value: 'bio', label: 'Шапка профиля (bio)' },
    { value: 'dm', label: 'Reels → директ (dm)' },
    { value: 'story', label: 'Сторис (story)' }
  ],
  vk: [
    { value: 'story', label: 'Сторис (story)' },
    { value: 'messag', label: 'Рассылки (messag)' },
    { value: 'bio', label: 'Био (bio)' },
    { value: 'long', label: 'Лонги (long)' }
  ],
  dzen: [
    { value: 'long', label: 'Лонг (long)' },
    { value: 'news', label: 'Статья (news)' }
  ],
  yt: [
    { value: 'bio', label: 'Био (bio)' },
    { value: 'nlong', label: 'Лонг Наталья (nlong)' },
    { value: 'slong', label: 'Лонг Саша (slong)' },
    { value: 'short', label: 'Шортс (short)' }
  ],
  rt: [
    { value: 'bio', label: 'Био (bio)' },
    { value: 'long', label: 'Лонг (long)' },
    { value: 'short', label: 'Шортс (short)' }
  ],
  tg: [
    { value: 'vmbot', label: 'Вселена Мастер Бот (vmbot)' },
    { value: 'nrclubbot', label: 'Поток Изобилия Бот (nrclubbot)' },
    { value: 'talism', label: 'Канал с Талисманами (talism)' }
  ],
  treads: [],
  pp: [],
  aj: []
};

function onPlatformChange() {
  const platform = document.getElementById('platform').value;
  const select = document.getElementById('label1Select');
  const custom = document.getElementById('label1Custom');
  const wrap = document.getElementById('label1Wrap');
  const platformCustom = document.getElementById('platformCustom');

  if (platform === '__custom__') {
    platformCustom.classList.remove('hidden');
  } else {
    platformCustom.classList.add('hidden');
    platformCustom.value = '';
  }

  select.innerHTML = '';
  custom.value = '';
  custom.classList.add('hidden');

  const options = presets[platform] || [];

  if (!platform || options.length === 0) {
    wrap.classList.add('hidden');
    return;
  }

  wrap.classList.remove('hidden');
  select.innerHTML = '<option value="">— выберите —</option>';
  options.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt.value;
    o.textContent = opt.label;
    select.appendChild(o);
  });
  const other = document.createElement('option');
  other.value = '__custom__';
  other.textContent = 'Другое...';
  select.appendChild(other);
}

function onLabel1Change() {
  const select = document.getElementById('label1Select');
  const custom = document.getElementById('label1Custom');
  if (select.value === '__custom__') {
    custom.classList.remove('hidden');
  } else {
    custom.classList.add('hidden');
    custom.value = '';
  }
}

function build() {
  const url = document.getElementById('url').value.trim();
  if (!url) { alert('Вставьте ссылку'); return; }

  const parts = [];
  let platform = document.getElementById('platform').value;
  if (platform === '__custom__') {
    platform = document.getElementById('platformCustom').value.trim();
  }
  if (platform) parts.push(platform);

  const select = document.getElementById('label1Select');
  const custom = document.getElementById('label1Custom');
  let label1 = '';
  if (select.value === '__custom__') {
    label1 = custom.value.trim();
  } else {
    label1 = select.value;
  }
  if (label1) parts.push(label1);

  ['label2','label3'].forEach(id => {
    const val = document.getElementById(id).value.trim();
    if (val) parts.push(val);
  });

  const result = url + parts.join('_');

  const resEl = document.getElementById('result');
  resEl.textContent = result;
  resEl.style.display = 'block';
  document.getElementById('copyBtn').style.display = 'inline-block';
}

function copyResult() {
  const text = document.getElementById('result').textContent;
  navigator.clipboard.writeText(text);
}

function fillDefaultUrl() {
  document.getElementById('url').value = 'https://t.me/potokizobot?start=';
}

onPlatformChange();
</script>
</body>
</html>
